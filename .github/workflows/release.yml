name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.3.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Test
        run: mvn -B -ntp test

      - name: Verify release version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PROJECT_VERSION="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)"
          test "$VERSION" = "$PROJECT_VERSION"

      - name: Verify native release provenance
        shell: bash
        run: |
          MANIFEST="src/main/resources/native/native-provenance.properties"
          test -f "$MANIFEST"
          grep -qx 'schema=2' "$MANIFEST"
          grep -qx 'rest.abi=23' "$MANIFEST"
          grep -qx 'dubbo.abi=5' "$MANIFEST"
          grep -qx 'redis.abi=5' "$MANIFEST"
          ! grep -q -- '-dirty$' "$MANIFEST"
          LINUX_EXPECTED="$(sed -n 's/^linux-x64.sha256=//p' "$MANIFEST")"
          WINDOWS_EXPECTED="$(sed -n 's/^windows-x64.sha256=//p' "$MANIFEST")"
          test "$(sha256sum src/main/resources/native/linux-x64/librust_hyper-linux-x64.so | awk '{print $1}')" = "$LINUX_EXPECTED"
          test "$(sha256sum src/main/resources/native/windows-x64/rust_hyper-windows-x64.dll | awk '{print $1}')" = "$WINDOWS_EXPECTED"

      - name: Publish Maven package
        run: mvn -B -ntp -DskipTests deploy

      - name: Prepare release assets
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          cp "target/java-rust-cache-${VERSION}.jar" release-assets/
          cp "target/java-rust-cache-${VERSION}-sources.jar" release-assets/
          cp "src/main/resources/native/windows-x64/rust_hyper-windows-x64.dll" release-assets/
          cp "src/main/resources/native/linux-x64/librust_hyper-linux-x64.so" release-assets/
          (cd release-assets && sha256sum * > SHA256SUMS)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          body_path: docs/RELEASE_NOTES_v${{ steps.version.outputs.version }}.md
          files: release-assets/*
